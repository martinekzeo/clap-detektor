<svg width="980" height="300" viewBox="0 0 980 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">clap-detektor banner</title>
  <desc id="desc">A colorful terminal style banner for clap-detektor.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="line" x1="112" y1="64" x2="868" y2="238" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.45" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="980" height="300" rx="28" fill="url(#bg)"/>
  <rect x="26" y="26" width="928" height="248" rx="20" fill="#020617" stroke="#334155" stroke-width="2"/>
  <circle cx="58" cy="56" r="8" fill="#ef4444"/>
  <circle cx="84" cy="56" r="8" fill="#f59e0b"/>
  <circle cx="110" cy="56" r="8" fill="#22c55e"/>

  <path d="M60 100H920" stroke="#1e293b"/>
  <path d="M90 224C154 174 214 174 278 224C342 274 402 274 466 224C530 174 590 174 654 224C718 274 778 274 842 224" stroke="url(#line)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>

  <text x="490" y="132" text-anchor="middle" fill="#e5e7eb" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="58" font-weight="700" letter-spacing="2">
    CLAP DETEKTOR
  </text>
  <text x="490" y="172" text-anchor="middle" fill="#94a3b8" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="22">
    mic  &gt;  clap clap  &gt;  Visual Studio Code
  </text>

  <text x="90" y="226" fill="#22d3ee" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="22">sound in</text>
  <text x="421" y="226" fill="#c4b5fd" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="22">2x clap</text>
  <text x="760" y="226" fill="#fdba74" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="22">launch</text>
</svg>
